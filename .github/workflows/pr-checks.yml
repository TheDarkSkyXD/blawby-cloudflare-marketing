name: PR checks

on:
  pull_request:
    branches: [master]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for legacy paths in source
        run: pnpm run check:legacy-paths

      - name: Build Next.js site
        env:
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
        run: pnpm run build

      - name: Check exported SEO metadata
        run: pnpm run check:seo

      - name: Check sitemap
        run: pnpm run check:sitemap

      - name: Check internal links
        run: pnpm run check:links

      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --offline
            --base "${{ github.workspace }}/out"
            --root-dir "${{ github.workspace }}/out"
            --exclude "favicon\.ico"
            --exclude "\.ico\?"
            --exclude "site\.webmanifest"
            --exclude "#"
            "./out/**/*.html"
          fail: true
          failIfEmpty: true

      - name: Deploy Cloudflare Pages preview
        id: deploy-preview
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -o pipefail
          pnpm exec wrangler pages deploy out \
            --project-name="${{ vars.CF_PAGES_PROJECT_NAME }}" \
            --branch="$BRANCH_NAME" 2>&1 | tee deploy-output.txt
          preview_url=$(grep -Eo 'https://[^[:space:]]+\.pages\.dev' deploy-output.txt | tail -n 1)
          if [ -z "$preview_url" ]; then
            echo "Could not find Cloudflare Pages preview URL in deploy output"
            exit 1
          fi
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"

      # Lighthouse CI removed from PR checks because Cloudflare Pages preview URLs 
      # automatically inject x-robots-tag: noindex, which always fails the 
      # is-crawlable audit. Lighthouse runs against production in deploy.yml instead.
